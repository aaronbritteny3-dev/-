<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberMoku Iso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #05010a; }
      canvas { display: block; width: 100%; height: 100%; }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #05010a; }
      ::-webkit-scrollbar-thumb { background: #d946ef; border-radius: 4px; }
      
      @keyframes glitch {
        0% { transform: translate(0) }
        20% { transform: translate(-2px, 2px) }
        40% { transform: translate(-2px, -2px) }
        60% { transform: translate(2px, 2px) }
        80% { transform: translate(2px, -2px) }
        100% { transform: translate(0) }
      }
      .glitch-text {
        animation: glitch 2s infinite linear alternate-reverse;
      }
      
      @keyframes fadeIn {
        0% { opacity: 0; transform: translateY(20px) }
        100% { opacity: 1; transform: translateY(0) }
      }
      .animate-fadeIn {
        animation: fadeIn 0.6s ease-out forwards;
      }
    </style>

</head>
